name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches package version
        shell: bash
        run: |
          version=$(python -c "import pathlib,re; text=pathlib.Path('pyproject.toml').read_text(); print(re.search(r'^version = \"([^\"]+)\"', text, re.M).group(1))")
          runtime_version=$(PYTHONPATH=src python -c "import mindwell; print(mindwell.__version__)")
          test "${GITHUB_REF_NAME}" = "v${version}"
          test "${runtime_version}" = "${version}"
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[semantic]"
      - name: Test
        run: python -m unittest discover -s tests -v
        env:
          PYTHONPATH: src
      - name: Build wheel and source archive
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
